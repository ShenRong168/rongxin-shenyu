<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>找不到這一頁｜榮心紳語</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/rongxin-shenyu/assets/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --matcha: #a9ba9d;
        --ink: #3a3f36;
        --paper: #f6f4ee;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--paper);
        color: var(--ink);
        font-family: "Noto Serif TC", "PingFang TC", serif;
        text-align: center;
        padding: 2rem;
      }
      .card { max-width: 26rem; }
      .mark { font-size: 2.5rem; color: var(--matcha); margin-bottom: 1rem; }
      h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.8rem; }
      p { font-size: 1rem; line-height: 1.9; color: #5c6156; margin-bottom: 2rem; }
      a.home {
        display: inline-block;
        padding: 0.7rem 1.8rem;
        border-radius: 999px;
        background: var(--matcha);
        color: #fff;
        text-decoration: none;
        font-size: 0.95rem;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">❦</div>
      <h1>這一頁不在這裡。</h1>
      <p>
        沒關係，走錯路有時候也是一種休息。<br />
        你要找的東西，也許就在首頁。
      </p>
      <a class="home" href="/rongxin-shenyu/">回到榮心紳語</a>
    </div>
  </body>
</html>
