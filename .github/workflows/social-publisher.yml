name: Social Publisher

on:
  workflow_dispatch:
  schedule:
    - cron: "3/5 * * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: social-publisher/package-lock.json

      - name: Install dependencies
        working-directory: social-publisher
        run: npm ci

      - name: Publish due scheduled posts
        working-directory: social-publisher
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: npm run publish:scheduled

      - name: Commit schedule status
        run: |
          if git diff --quiet -- social-publisher/scheduled-posts.json; then
            echo "No schedule status changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add social-publisher/scheduled-posts.json
          git commit -m "Update scheduled post status"
          git push
